<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes Form</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons@latest/tabler-icons.min.css">
  <style>
    :root {
      --border-radius-md: 6px;
      --border-radius-lg: 8px;
      --color-background-primary: #ffffff;
      --color-background-secondary: #f5f5f5;
      --color-border-tertiary: #e0e0e0;
      --color-text-secondary: #666666;
      --color-text-tertiary: #999999;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
      background: #fafafa;
    }
  </style>
</head>
<body>
  <h2 class="sr-only">A simple form to jot down a note with title, content, and tags, saved to a running list.</h2>
  <div style="display: flex; flex-direction: column; gap: 12px; max-width: 600px;">
    <input type="text" id="note-title" placeholder="Title" style="font-weight: 500;" />
    <textarea id="note-body" placeholder="Write your note..." rows="5" style="resize: vertical; padding: 8px 12px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); font-family: var(--font-sans); font-size: 14px; background: var(--color-background-primary);"></textarea>
    <input type="text" id="note-tags" placeholder="Tags (comma separated)" />
    <div style="display: flex; gap: 8px;">
      <button id="save-btn" style="flex: 1;"><i class="ti ti-plus" aria-hidden="true" style="margin-right:6px;"></i>Save note</button>
      <button id="clear-btn"><i class="ti ti-trash" aria-hidden="true"></i></button>
    </div>

    <div id="notes-list" style="display: flex; flex-direction: column; gap: 8px; margin-top: 1rem;"></div>
  </div>

  <script>
    let notes = [];

    function render() {
      const list = document.getElementById('notes-list');
      if (notes.length === 0) {
        list.innerHTML = '<p style="font-size: 13px; color: var(--color-text-tertiary);">No notes yet.</p>';
        return;
      }
      list.innerHTML = notes.map((n, i) => `
        <div style="background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 0.75rem 1rem;">
          <div style="display: flex; justify-content: space-between; align-items: start;">
            <p style="font-weight: 500; font-size: 14px; margin: 0;">${n.title || 'Untitled'}</p>
            <button data-i="${i}" class="del-btn" aria-label="Delete note" style="border: none; padding: 2px 6px;"><i class="ti ti-x" aria-hidden="true" style="font-size:14px;"></i></button>
          </div>
          <p style="font-size: 13px; color: var(--color-text-secondary); margin: 4px 0; white-space: pre-wrap;">${n.body}</p>
          ${n.tags ? `<div style="display:flex; gap:6px; flex-wrap:wrap; margin-top:6px;">${n.tags.split(',').map(t => t.trim()).filter(Boolean).map(t => `<span style="background: var(--color-background-secondary); color: var(--color-text-secondary); font-size: 12px; padding: 2px 8px; border-radius: var(--border-radius-md);">${t}</span>`).join('')}</div>` : ''}
        </div>
      `).join('');

      document.querySelectorAll('.del-btn').forEach(btn => {
        btn.onclick = () => {
          notes.splice(Number(btn.dataset.i), 1);
          render();
        };
      });
    }

    document.getElementById('save-btn').onclick = () => {
      const title = document.getElementById('note-title').value.trim();
      const body = document.getElementById('note-body').value.trim();
      const tags = document.getElementById('note-tags').value.trim();
      if (!body && !title) return;
      notes.unshift({ title, body, tags });
      document.getElementById('note-title').value = '';
      document.getElementById('note-body').value = '';
      document.getElementById('note-tags').value = '';
      render();
    };

    document.getElementById('clear-btn').onclick = () => {
      notes = [];
      render();
    };

    render();
  </script>
</body>
</html>
